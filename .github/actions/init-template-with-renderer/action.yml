name: Setup boilerplate
description: Setup boilerplate
inputs:
  renderer-template:
    description: "Define what vite template should be used to create renderer in case if renderer package doesn't exist"
    required: false
    default: ''


runs:
  using: "composite"
  steps:
    - if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        Xvfb :99 -screen 0 1280x960x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    # Pin Node via .nvmrc (single source of truth). 'latest' previously pulled
    # in brand-new majors (e.g. Node 26) that have no prebuilt better-sqlite3
    # binary, so install fell back to a source build that fails against the
    # newer V8 — breaking every CI run at the install step.
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'

    - name: Check if renderer directory exists
      id: check-renderer
      run: >-
        if [ -d "packages/renderer" ]; then
          echo "RENDERER_EXIST=true" >> $GITHUB_OUTPUT
        else
          echo "RENDERER_EXIST=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - run: |
        npm run create-renderer -- -- --template ${{inputs.renderer-template}}
        npm start --workspace @app/integrate-renderer
      shell: bash
      if: inputs.renderer-template != '' && steps.check-renderer.outputs.RENDERER_EXIST == 'false'

    - name: Install Dependencies
      run: >-
        if [ "${{ steps.check-renderer.outputs.RENDERER_EXIST }}" == "true" ] && [ -f "package-lock.json" ]; then
          npm ci
        else
          npm install
        fi
      shell: bash

    # Newer npm gates dependency install scripts behind an allow-list and skips
    # Electron's `postinstall`, so its platform binary is never downloaded. The
    # main/preload Vite configs introspect
    # versions via `npx electron`, and the boot smoke test launches the real
    # app, so run Electron's installer explicitly.
    #
    # We clear any partial install first so Electron's `install.js` cannot
    # short-circuit via its "already installed" check, force a fresh download,
    # then assert the binary actually resolves. Without the assertion a failed
    # install is silent and only surfaces later as a confusing "Electron failed
    # to install correctly" error during the Vite build.
    - name: Ensure Electron binary is installed
      shell: bash
      env:
        ELECTRON_SKIP_BINARY_DOWNLOAD: ''
      run: |
        set -euo pipefail
        rm -rf node_modules/electron/dist node_modules/electron/path.txt
        node node_modules/electron/install.js
        node -e "const p = require('electron'); if (typeof p !== 'string') throw new Error('Electron binary did not install'); console.log('Electron binary: ' + p)"
